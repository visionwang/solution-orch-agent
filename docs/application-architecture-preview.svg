 sans-serif" font-size="18" fill="#22c55e" text-anchor="start"><tspan x="314" dy="0">SSE 事件</tspan><tspan x="314" dy="23.400000000000002">steps</tspan><tspan x="314" dy="23.400000000000002">progress</tspan><tspan x="314" dy="23.400000000000002">complete</tspan><tspan x="314" dy="23.400000000000002">error</tspan><tspan x="314" dy="23.400000000000002"></tspan><tspan x="314" dy="23.400000000000002">POST /api/projects/:id/chat</tspan><tspan x="314" dy="23.400000000000002">返回 chunk / done</tspan></text><text x="610" y="276" font-family="Arial, PingFang SC, sans-serif" font-size="24" fill="#1e40af" text-anchor="start"><tspan x="610" dy="0">编排与 Agent 核心</tspan></text><text x="772" y="355" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#374151" text-anchor="middle"><tspan x="772" dy="0">documents[]</tspan></text><text x="806" y="427" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="806" dy="0">requirement-analysis</tspan><tspan x="806" dy="23.400000000000002">extractRequirements()</tspan></text><text x="806" y="507" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="806" dy="0">product-knowledge-indexing</tspan><tspan x="806" dy="23.400000000000002">indexProductKnowledge()</tspan></text><text x="806" y="591" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="806" dy="0">product-matching</tspan><tspan x="806" dy="23.400000000000002">matchProducts()</tspan></text><text x="806" y="675" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="806" dy="0">draft-generation</tspan><tspan x="806" dy="23.400000000000002">generateDrafts()</tspan></text><text x="806" y="759" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="806" dy="0">ai-review</tspan><tspan x="806" dy="23.400000000000002">reviewDrafts()</tspan></text><text x="703" y="538" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#374151" text-anchor="middle"><tspan x="703" dy="0">Requirement</tspan><tspan x="703" dy="23.400000000000002">Product Matcher</tspan><tspan x="703" dy="23.400000000000002">Draft Writer</tspan><tspan x="703" dy="23.400000000000002">Review Agent</tspan><tspan x="703" dy="23.400000000000002">Chat Agent</tspan></text><text x="1220" y="276" font-family="Arial, PingFang SC, sans-serif" font-size="24" fill="#1e40af" text-anchor="start"><tspan x="1220" dy="0">能力与数据底座</tspan></text><text x="1386" y="368" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#374151" text-anchor="middle"><tspan x="1386" dy="0">OpenAI compatible LLM</tspan><tspan x="1386" dy="23.400000000000002">DeepSeek / other models</tspan></text><text x="1361" y="516" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#374151" text-anchor="middle"><tspan x="1361" dy="0">Embedding Router</tspan><tspan x="1361" dy="23.400000000000002">local / cloud + LRU cache</tspan></text><text x="1347" y="657" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle"><tspan x="1347" dy="0">Vector Store</tspan><tspan x="1347" dy="23.400000000000002">cosine + chunks</tspan></text><text x="1377" y="790" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1377" dy="0">SQLite / node:sqlite</tspan><tspan x="1377" dy="20.8">projects</tspan><tspan x="1377" dy="20.8">users</tspan><tspan x="1377" dy="20.8">project_members</tspan><tspan x="1377" dy="20.8">documents</tspan><tspan x="1377" dy="20.8">requirements</tspan><tspan x="1377" dy="20.8">matches / drafts / reviews</tspan><tspan x="1377" dy="20.8">workflow_runs / conversations</tspan><tspan x="1377" dy="20.8">evaluations / vector_chunks</tspan></text><text x="1602" y="808" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#374151" text-anchor="middle"><tspan x="1602" dy="0">本地文件</tspan><tspan x="1602" dy="23.400000000000002">uploads/</tspan><tspan x="1602" dy="23.400000000000002">DOCX export</tspan></text><text x="82" y="860" font-family="Arial, PingFang SC, sans-serif" font-size="20" fill="#3b82f6" text-anchor="start"><tspan x="82" dy="0">证据区</tspan></text><text x="114" y="924" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#22c55e" text-anchor="start"><tspan x="114" dy="0">真实接口</tspan><tspan x="114" dy="23.400000000000002">POST /api/auth/login</tspan><tspan x="114" dy="23.400000000000002">POST /api/projects/:id/run</tspan><tspan x="114" dy="23.400000000000002">GET /api/projects/:id/run/stream</tspan><tspan x="114" dy="23.400000000000002">POST /api/projects/:id/chat</tspan><tspan x="114" dy="23.400000000000002">GET /api/projects/:id/evaluations</tspan><tspan x="114" dy="23.400000000000002">POST /api/projects/:id/export/docx</tspan><tspan x="114" dy="23.400000000000002"></tspan><tspan x="114" dy="23.400000000000002">EventSource -&gt; steps / progress / complete</tspan></text><text x="632" y="924" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#22c55e" text-anchor="start"><tspan x="632" dy="0">真实 Workflow</tspan><tspan x="632" dy="23.400000000000002">createWorkflow({ id: "solution-orch-bid-workflow" })</tspan><tspan x="632" dy="23.400000000000002">.then(requirementAnalysisStep)</tspan><tspan x="632" dy="23.400000000000002">.then(productIndexingStep)</tspan><tspan x="632" dy="23.400000000000002">.then(productMatchingStep)</tspan><tspan x="632" dy="23.400000000000002">.then(draftGenerationStep)</tspan><tspan x="632" dy="23.400000000000002">.then(aiReviewStep)</tspan><tspan x="632" dy="23.400000000000002"></tspan><tspan x="632" dy="23.400000000000002">ctx.metrics + previousRun 在多 Agent 间共享</tspan></text><text x="1164" y="924" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#22c55e" text-anchor="start"><tspan x="1164" dy="0">真实持久化域</tspan><tspan x="1164" dy="23.400000000000002">projects / users / project_members / documents / requirements</tspan><tspan x="1164" dy="23.400000000000002">matches / drafts / review_findings / workflow_runs</tspan><tspan x="1164" dy="23.400000000000002">vector_chunks / conversations / evaluations</tspan><tspan x="1164" dy="23.400000000000002"></tspan><tspan x="1164" dy="23.400000000000002">运行结果 result_json + 聊天历史 + 评估快照沉淀到同一 SQLite 基座</tspan></text></svg>
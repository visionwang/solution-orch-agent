width="2" /><polyline points="317.18837358517095,880.2066048694107 328,875 317.18837358517095,869.7933951305893" fill="none" stroke="#047857" stroke-width="2" /><polyline points="500,875 548,875" fill="none" stroke="#1e3a5f" stroke-width="2" /><polyline points="537.188373585171,880.2066048694107 548,875 537.188373585171,869.7933951305893" fill="none" stroke="#1e3a5f" stroke-width="2" /><polyline points="728,875 776,875" fill="none" stroke="#6d28d9" stroke-width="2" /><polyline points="765.188373585171,880.2066048694107 776,875 765.188373585171,869.7933951305893" fill="none" stroke="#6d28d9" stroke-width="2" /><polyline points="866,914 866,1000 178,1000 178,894" fill="none" stroke="#1e3a5f" stroke-width="2" /><polyline points="183.20660486941068,904.811626414829 178,894 172.7933951305893,904.811626414829" fill="none" stroke="#1e3a5f" stroke-width="2" /><rect x="82" y="986" width="420" height="168" rx="10" ry="10" fill="#1e293b" stroke="#1e3a5f" stroke-width="2" /><rect x="544" y="986" width="462" height="168" rx="10" ry="10" fill="#1e293b" stroke="#1e3a5f" stroke-width="2" /><rect x="1054" y="986" width="614" height="168" rx="10" ry="10" fill="#1e293b" stroke="#1e3a5f" stroke-width="2" /><text x="80" y="70" font-family="Arial, PingFang SC, sans-serif" font-size="30" fill="#1e40af" text-anchor="start"><tspan x="80" dy="0">业务架构视图 · 从商机到投标交付</tspan></text><text x="80" y="104" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#64748b" text-anchor="start"><tspan x="80" dy="0">系统不是单纯写文档，而是把角色协同、资料治理、需求判断、产品承诺、审校闭环和知识回流串成一个项目任务制业务系统。</tspan></text><text x="151" y="182" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="151" dy="0">商机 / 招标</tspan></text><text x="363" y="182" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle"><tspan x="363" dy="0">资料汇聚</tspan></text><text x="581" y="182" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="581" dy="0">需求拆解</tspan></text><text x="800" y="182" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="800" dy="0">产品匹配</tspan></text><text x="1018" y="182" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1018" dy="0">方案编制</tspan></text><text x="1223" y="184" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1223" dy="0">AI 审校</tspan></text><text x="1423" y="182" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1423" dy="0">定稿投标</tspan></text><text x="82" y="294" font-family="Arial, PingFang SC, sans-serif" font-size="24" fill="#1e40af" text-anchor="start"><tspan x="82" dy="0">业务角色树</tspan></text><text x="286" y="386" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="286" dy="0">销售 / 售前</tspan><tspan x="286" dy="23.400000000000002">发起项目、上传资料</tspan></text><text x="286" y="466" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="286" dy="0">产品 / 交付</tspan><tspan x="286" dy="23.400000000000002">确认能力、补业务证据</tspan></text><text x="286" y="546" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="286" dy="0">投标经理 / 法务</tspan><tspan x="286" dy="23.400000000000002">审核承诺、把控风险</tspan></text><text x="286" y="626" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#3b82f6" text-anchor="start"><tspan x="286" dy="0">客户 / 招标方</tspan><tspan x="286" dy="23.400000000000002">发布招标、澄清问题</tspan></text><text x="510" y="294" font-family="Arial, PingFang SC, sans-serif" font-size="24" fill="#1e40af" text-anchor="start"><tspan x="510" dy="0">项目任务制业务中台</tspan></text><text x="786" y="472" font-family="Arial, PingFang SC, sans-serif" font-size="20" fill="#1e40af" text-anchor="middle"><tspan x="786" dy="0">项目工作台</tspan><tspan x="786" dy="26">一个项目聚合文档、成员、对话、运行记录</tspan><tspan x="786" dy="26">并把“分析 → 起草 → 审校 → 定稿”</tspan><tspan x="786" dy="26">做成可追踪任务流</tspan></text><text x="650" y="369" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle"><tspan x="650" dy="0">资料上传与归档</tspan></text><text x="921" y="369" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="921" dy="0">需求拆解与评分点</tspan></text><text x="651" y="639" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="651" dy="0">匹配评估与缺口判断</tspan></text><text x="922" y="639" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="922" dy="0">草稿协同与 AI 审校</tspan></text><text x="1174" y="294" font-family="Arial, PingFang SC, sans-serif" font-size="24" fill="#1e40af" text-anchor="start"><tspan x="1174" dy="0">输出物扇出</tspan></text><text x="1320" y="522" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#374151" text-anchor="middle"><tspan x="1320" dy="0">正式交付包</tspan></text><text x="1500" y="380" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1500" dy="0">需求清单 / 评分点</tspan></text><text x="1509" y="472" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1509" dy="0">匹配矩阵 / 缺口清单</tspan></text><text x="1509" y="576" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1509" dy="0">解决方案 / 标书草稿</tspan></text><text x="1502" y="680" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1502" dy="0">审核意见 / 风险清单</tspan></text><text x="1319" y="778" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="1319" dy="0">对话答疑 / 项目记忆</tspan></text><text x="82" y="796" font-family="Arial, PingFang SC, sans-serif" font-size="24" fill="#1e40af" text-anchor="start"><tspan x="82" dy="0">治理与知识回流</tspan></text><text x="196" y="881" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="196" dy="0">人工复核 / 定稿</tspan></text><text x="417" y="881" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="417" dy="0">评估打分 / notes</tspan></text><text x="642" y="881" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#374151" text-anchor="middle"><tspan x="642" dy="0">conversations / runs</tspan></text><text x="866" y="881" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle"><tspan x="866" dy="0">下次项目复用</tspan></text><text x="104" y="1026" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#22c55e" text-anchor="start"><tspan x="104" dy="0">真实输入物</tspan><tspan x="104" dy="23.400000000000002">招标文件.pdf</tspan><tspan x="104" dy="23.400000000000002">需求说明书.docx</tspan><tspan x="104" dy="23.400000000000002">产品说明书.docx</tspan><tspan x="104" dy="23.400000000000002">澄清纪要.xlsx</tspan><tspan x="104" dy="23.400000000000002">历史方案 / 模板参考</tspan><tspan x="104" dy="23.400000000000002"></tspan><tspan x="104" dy="23.400000000000002">这些输入先进入“资料汇聚”，再转成结构化需求与知识片段。</tspan></text><text x="566" y="1026" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#22c55e" text-anchor="start"><tspan x="566" dy="0">真实角色边界</tspan><tspan x="566" dy="23.400000000000002">owner -&gt; 创建项目、管理成员、删除项目</tspan><tspan x="566" dy="23.400000000000002">editor -&gt; 上传文档、运行流程、Chat、编辑草稿、导出</tspan><tspan x="566" dy="23.400000000000002">viewer -&gt; 查看需求、匹配、草稿、审核、评估</tspan><tspan x="566" dy="23.400000000000002"></tspan><tspan x="566" dy="23.400000000000002">AI 负责分析和起草，人负责承诺与最终提交。</tspan></text><text x="1076" y="1026" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#22c55e" text-anchor="start"><tspan x="1076" dy="0">真实业务产物</tspan><tspan x="1076" dy="23.400000000000002">requirements[]</tspan><tspan x="1076" dy="23.400000000000002">matches[]</tspan><tspan x="1076" dy="23.400000000000002">drafts.solution / drafts.bid</tspan><tspan x="1076" dy="23.400000000000002">reviewFindings[]</tspan><tspan x="1076" dy="23.400000000000002">conversation history / evaluations / workflow_runs</tspan><tspan x="1076" dy="23.400000000000002"></tspan><tspan x="1076" dy="23.400000000000002">系统把“结果物”与“过程证据”一起沉淀，下一次不是从零重新写。</tspan></text></svg>
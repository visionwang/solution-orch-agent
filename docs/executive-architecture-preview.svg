  <text font-family="Virgil, Segoe UI, PingFang SC, sans-serif" font-size="32" fill="#1e40af" text-anchor="start" opacity="1"><tspan x="42" y="72">高层架构图 · 汇报视角</tspan></text>
<text font-family="Virgil, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#64748b" text-anchor="start" opacity="1"><tspan x="42" y="106">面向管理汇报，聚焦项目任务制、AI 辅助投标闭环、知识沉淀与多人协同，不展开实现细节。</tspan></text>
